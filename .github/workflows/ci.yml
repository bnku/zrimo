name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm install --global npm@11.16.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown
      - run: npm ci
      - run: npm run build
      - run: npm run check
      - run: npm run fuzz:js
      - run: cargo install cargo-audit --locked
      - run: npm run audit:vulnerabilities
      - run: npm run report:size
      - run: npm run report:sbom
      - run: npm run test:pack
      - run: npm run pages:build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-reports
          path: artifacts/

  browsers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm install --global npm@11.16.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          targets: wasm32-unknown-unknown
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:e2e
      - run: npm run test:e2e:matrix
      - run: npm run test:pages
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-reports
          path: |
            artifacts/
            test-results/

  rust-fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --global npm@11.16.0
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: FUZZ_SECONDS=2 npm run fuzz:rust
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fuzz-smoke-report
          path: artifacts/fuzz-rust.json
